name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/dkdmd dist/
          cd dist && tar czf dkdmd-linux-amd64.tar.gz dkdmd
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/dkdmd-linux-amd64.tar.gz

  build-macos-intel:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Build
        run: cargo build --release --target x86_64-apple-darwin
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/dkdmd dist/
          cd dist && tar czf dkdmd-macos-intel.tar.gz dkdmd
      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: dist/dkdmd-macos-intel.tar.gz

  build-macos-arm:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/dkdmd dist/
          cd dist && tar czf dkdmd-macos-arm64.tar.gz dkdmd
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/dkdmd-macos-arm64.tar.gz

  package-deb:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build deb package
        run: cargo deb --target x86_64-unknown-linux-gnu
      - name: Find deb file
        id: deb
        run: echo "path=$(find target -name '*.deb' | head -1)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: ${{ steps.deb.outputs.path }}

  release:
    needs: [build-linux, build-macos-intel, build-macos-arm, package-deb]
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Get tag
        id: get_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: DKDMD ${{ steps.get_tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/linux-amd64/dkdmd-linux-amd64.tar.gz
            artifacts/macos-intel/dkdmd-macos-intel.tar.gz
            artifacts/macos-arm64/dkdmd-macos-arm64.tar.gz
            artifacts/deb-package/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate SHA256
        id: sha
        run: |
          echo "linux_amd64=$(sha256sum artifacts/linux-amd64/dkdmd-linux-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_intel=$(sha256sum artifacts/macos-intel/dkdmd-macos-intel.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_arm64=$(sha256sum artifacts/macos-arm64/dkdmd-macos-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Get version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          sed -e "s|{{VERSION}}|${{ steps.ver.outputs.version }}|g" \
              -e "s|{{TAG}}|${GITHUB_REF#refs/tags/}|g" \
              -e "s|{{SHA256_LINUX_AMD64}}|${{ steps.sha.outputs.linux_amd64 }}|g" \
              -e "s|{{SHA256_MACOS_INTEL}}|${{ steps.sha.outputs.macos_intel }}|g" \
              -e "s|{{SHA256_MACOS_ARM64}}|${{ steps.sha.outputs.macos_arm64 }}|g" \
              .github/formula.rb.template > dkdmd.rb

      - name: Push to Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Maka314/homebrew-dkdmd.git tap
          mkdir -p tap/Formula
          cp dkdmd.rb tap/Formula/dkdmd.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dkdmd.rb
          git commit -m "Update dkdmd to ${{ steps.ver.outputs.version }}" || echo "No changes"
          git push

  update-apt-repo:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: deb

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -d gh-pages/.git ]; then
            mkdir -p gh-pages
            cd gh-pages
            git init
            git checkout -b gh-pages
          fi

      - name: Setup reprepro
        run: |
          mkdir -p gh-pages/conf
          cat > gh-pages/conf/distributions <<EOF
          Origin: Maka314
          Label: DKDMD
          Codename: stable
          Architectures: amd64
          Components: main
          Description: DKDMD APT repository
          SignWith: no
          EOF

      - name: Add deb to repo
        run: |
          cd gh-pages
          DEB_FILE=$(find ../deb -name '*.deb' | head -1)
          reprepro includedeb stable "$DEB_FILE"

      - name: Create install script
        run: |
          cat > gh-pages/install.sh <<'SCRIPT'
          #!/bin/bash
          set -e
          echo "Adding DKDMD APT repository..."
          echo "deb [trusted=yes] https://maka314.github.io/DKDMD stable main" | sudo tee /etc/apt/sources.list.d/dkdmd.list
          sudo apt-get update
          echo "You can now install with: sudo apt-get install dkdmd"
          SCRIPT
          chmod +x gh-pages/install.sh

      - name: Push gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update APT repo for ${GITHUB_REF#refs/tags/}" || echo "No changes"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Maka314/DKDMD.git
          git push -u origin gh-pages
