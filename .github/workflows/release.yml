name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Step 1: determine whether the version changed (branch push only) ──────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version / set tag
        id: version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="v${CURRENT}"

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            # Triggered by a manual tag push – always release
            TAG="${GITHUB_REF#refs/tags/}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # Branch push – only release if version actually changed
            PREVIOUS=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "")
            if [[ "$CURRENT" != "$PREVIOUS" ]]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Version changed: $PREVIOUS -> $CURRENT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Version unchanged: $CURRENT"
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ── Step 2: build deb (amd64 + arm64) ────────────────────────────────────
  build-deb:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (arm64)
        if: matrix.arch == 'arm64'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: |
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            cross build --release --target ${{ matrix.target }}
            cargo deb --target ${{ matrix.target }} --no-build
          else
            cargo deb --target ${{ matrix.target }}
          fi

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: target/${{ matrix.target }}/debian/*.deb

  # ── Step 3: create GitHub Release ────────────────────────────────────────
  release:
    needs: [check-version, build-deb]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -name '*.deb' -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: DKDMD ${{ needs.check-version.outputs.tag }}
          files: artifacts/**/*.deb
          generate_release_notes: true

